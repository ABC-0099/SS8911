<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>끼역띠귿 — 커뮤니티</title>
    <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/community/list.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='community')}"></div>

<div class="page-header">
    <h1>커뮤니티</h1>
    <p>일상, 문화, 학습 후기를 자유롭게 나눠보세요</p>
</div>

<div class="filter-bar">
    <aside class="tabs">
        <button type="button" class="tab category-btn" data-category="ALL">전체</button>
        <button type="button" class="tab category-btn" data-category="CULTURAL">문화교류</button>
        <button type="button" class="tab category-btn" data-category="REVIEW">학습후기</button>
        <button type="button" class="tab category-btn" data-category="FREE">자유게시판</button>
    </aside>
</div>

<div class="toolbar">
    <div class="search-area">
        <div class="search-wrap">
            <span>🔍</span>
            <input type="text" id="search_kw" placeholder="제목, 내용, 태그로 검색" />
        </div>
        <button type="button" id="btn_search" class="search-btn">검색</button>
    </div>
    <div class="toolbar-right">
        <select class="sort-select" id="sort-select">
            <option value="newest">최신순</option>
            <option value="oldest">등록순</option>
        </select>
        <a th:href="@{/community/write}" class="write-btn">✏️ 글쓰기</a>
    </div>
</div>

<div class="post-wrap">
    <div class="info-box">🔔  커뮤니티 이용 시 욕설·비방·혐오 표현은 삼가 주세요. 타인을 존중하는 건강한 소통 문화를 만들어요.</div>

    <div class="post" th:each="post : ${postList}">
        <div class="post-top">
            <div class="post-avatar" th:text="${#strings.substring(post.author.username, 0, 1)}">리</div>
            <div>
                <div class="post-author" th:text="${post.author.username}">사용자</div>
                <div class="post-meta" th:text="${post.author.nationality + ' · ' + #temporals.format(post.createdDate, 'MM.dd HH:mm')}">시간</div>
            </div>
        </div>

        <a th:href="@{/community(category=${post.category})}"
           class="post-tag"
           th:text="${post.category.description}">태그</a>

        <a th:href="@{/community/{id}(id=${post.id})}">
            <div class="post-title" th:text="${post.title}">제목</div>
            <div class="post-text" th:text="${post.content}">내용</div>
        </a>

        <div class="post-footer">
            <a th:href="@{/community/{id}(id=${post.id})}" class="pf-action">
                💬 [[${#lists.size(post.comments)}]]
            </a>
            <span class="pf-action"
                  th:onclick="|navigator.clipboard.writeText(window.location.origin + '/community/' + ${post.id}).then(function(){ alert('링크가 복사되었습니다! 😊'); })|">
                ↗ 공유
            </span>
            <span class="pf-spacer"></span>
            <span class="pf-report"
                  onclick="alert('신고가 접수되었습니다. 검토 후 조치하겠습니다.')">
                🚩 신고
            </span>
        </div>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/community.js}"></script>
</body>
</html>
